services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sandboxdb
      POSTGRES_USER: sandboxuser
      POSTGRES_PASSWORD: sandboxpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandboxuser -d sandboxdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    environment:
      PORT: 5000
    command: sh -c "npx prisma generate && npx prisma db push && npm start"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    ports:
      - "5000:5000"

  web-admin:
    build:
      context: ./web-admin
    env_file:
      - ./web-admin/.env.docker
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  azurite-data:
